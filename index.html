<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading...</title>

<style>
body { margin:0; }
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    cursor:pointer;
}
video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<div id="overlay">Click to view image</div>

<video id="video" preload="auto">
    <source src="video.mp4" type="video/mp4">
</video>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("video");

overlay.onclick = () => {
    overlay.style.display = "none";
    video.muted = false;
    video.play().then(()=>{
        document.documentElement.requestFullscreen();
    }).catch(e=>{
        alert("Error reproduciendo video");
        console.log(e);
    });
};
</script>

</body>
</html>
